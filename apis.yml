aid: harsco
name: Enviri (formerly Harsco)
description: >-
  Enviri Corporation, formerly known as Harsco Corporation, is a trusted global
  leader in environmental solutions, developing and refining methods of recycling
  and beneficial reuse for industrial customers. Enviri operates through three
  divisions: Clean Earth (hazardous waste management and recycling), Harsco
  Environmental (services to the global steel industry), and Harsco Rail
  (rail-track maintenance equipment and services). Enviri does not currently
  publish a public developer portal or open APIs.
